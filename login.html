<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image/png" href="logo.jpg">
    <title>Secure Login | E-Ration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem; border-radius: 1.5rem; width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        .logo { font-size: 3rem; margin-bottom: 1rem; }
        h2 { color: #111827; margin-bottom: 0.5rem; font-weight: 700; }
        p { color: #6b7280; font-size: 0.9rem; margin-bottom: 2rem; }
        
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; display: block; }
        input, select {
            width: 100%; padding: 0.85rem; border: 2px solid #e5e7eb; border-radius: 0.75rem;
            font-size: 1rem; transition: 0.3s; background: #f9fafb; outline: none;
        }
        input:focus, select:focus { border-color: #2563eb; background: white; }
        
        button {
            width: 100%; padding: 0.9rem; border: none; border-radius: 0.75rem;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-blue { background: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.5); }
        .btn-blue:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-green { background: #10b981; color: white; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.5); }
        
        #step2 { display: none; border-top: 1px solid #e5e7eb; margin-top: 1.5rem; padding-top: 1.5rem; animation: slideDown 0.4s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none; font-weight: 500; }
        .back-link { display: block; margin-top: 1.5rem; color: #6b7280; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🔐</div>
        <h2>Welcome Back</h2>
        <p>Enter your details to access the portal</p>

        <div id="step1">
            <div class="form-group">
                <label>Login As</label>
                <select id="role">
                    <option value="user">Citizen (Beneficiary)</option>
                    <option value="dealer">Ration Dealer</option>
                    <option value="admin">Govt. Official</option>
                </select>
            </div>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="username" placeholder="e.g. RC-101">
            </div>
            <button id="sendBtn" class="btn-blue" onclick="sendOTP()">Send OTP Code</button>
        </div>

        <div id="step2">
            <p id="otpStatusMsg" style="color: #10b981; font-weight: 600; margin-bottom: 1rem;">✨ OTP sent to your Mobile!</p>
            
            <div class="form-group">
                <input type="number" id="otp" placeholder="Enter 6-digit Code" style="text-align: center; letter-spacing: 0.5rem; font-weight: 700; font-size: 1.2rem;">
            </div>
            <button class="btn-green" onclick="verifyOTP()">Verify & Login</button>
        </div>
        <div class="error-msg" id="error"></div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        async function sendOTP() {
            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value.trim();
            const btn = document.getElementById('sendBtn');
            
            if(!username) return showError("Please enter User ID");

            btn.innerText = "Sending...";
            btn.style.opacity = "0.7";

            try {
                const res = await fetch('/api/auth/send-otp', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, role})
                });
                const data = await res.json();
                
                if(data.success) {
                    // Hide Step 1, Show Step 2
                    document.getElementById('step1').style.opacity = '0.5';
                    document.getElementById('step1').style.pointerEvents = 'none';
                    document.getElementById('step2').style.display = 'block';
                    
                    // 🟢 UPDATE MESSAGE FROM SERVER (Important for Fast2SMS Fallback)
                    if(data.message) {
                        document.getElementById('otpStatusMsg').innerText = "✨ " + data.message;
                    }
                    
                    showError(""); 
                } else {
                    showError(data.error || "Failed to send OTP");
                    btn.innerText = "Send OTP Code";
                    btn.style.opacity = "1";
                }
            } catch(e) { 
                showError("Server Error. Check Internet."); 
                btn.innerText = "Send OTP Code";
                btn.style.opacity = "1";
            }
        }

        async function verifyOTP() {
            const username = document.getElementById('username').value;
            const role = document.getElementById('role').value;
            const otp = document.getElementById('otp').value;
            
            if(!otp) return showError("Please enter the code");

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, role, otp})
                });
                const data = await res.json();
                
                if(data.success) {
                    if(role === 'dealer') {
                        localStorage.setItem('shopId', data.shopId);
                        localStorage.setItem('shopName', data.shopName);
                    } else if(role === 'user') {
                        localStorage.setItem('loggedUser', username);
                    }
                    window.location.href = data.redirect;
                } else {
                    showError(data.error);
                }
            } catch(e) { showError("Verification Failed"); }
        }
        
        function showError(msg) { 
            const el = document.getElementById('error'); 
            el.innerText = msg; 
            el.style.display = msg ? 'block' : 'none'; 
        }
    </script>
</body>
</html>
